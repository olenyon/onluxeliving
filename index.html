<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=2.0">
<title>Onluxe Living</title>

<style>
body {
    margin: 0;
    font-family: 'Helvetica Neue', sans-serif;
    background: #0d0d0d;
    color: #fff;
}

/* NAVBAR */
.nav {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
}

.nav img {
    height: 70px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 40px;
    letter-spacing: 2px;
}

.hero p {
    color: #c9a96e;
}

/* SECTION */
.section {
    padding: 60px 20px;
    max-width: 1200px;
    margin: auto;
}

.section h2 {
    text-align: center;
    margin-bottom: 30px;
    letter-spacing: 3px;
}

/* IMAGE GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
}

.grid img {
    width: 100%;
    border-radius: 10px;
}

/* DESKTOP */
@media(min-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
    }
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 40px;
    color: #aaa;
}
</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
    <img src="IMG_7499.png" alt="Onluxe Living">
</div>

<!-- HERO -->
<div class="hero">
    <h1>ONLUXE LIVING</h1>
    <p>Interior Design | Luxury Living</p>
</div>

<!-- LIVING ROOM -->
<div class="section">
    <h2>LIVING ROOM TRANSFORMATION</h2>
    <div class="grid">
        <img src="B036D62B-6BC4-4009-B6AA-EAC1CC70F252.png">
    </div>
</div>

<!-- DINING ROOM -->
<div class="section">
    <h2>DINING ROOM TRANSFORMATION</h2>
    <div class="grid">
        <img src="3C3E8B3F-462C-47E1-BF22-E70C2B441261.png">
    </div>
</div>

<!-- CORRIDOR -->
<div class="section">
    <h2>CORRIDOR TRANSFORMATION</h2>
    <div class="grid">
        <img src="7780F17C-8E73-430F-A597-914902A0F056.png">
    </div>
</div>

<!-- BEDROOM 1 -->
<div class="section">
    <h2>MASTER BEDROOM</h2>
    <div class="grid">
        <img src="6F7E3110-36CD-4EAD-89F8-8F6F6F9C3C2E.png">
    </div>
</div>

<!-- BEDROOM 2 -->
<div class="section">
    <h2>BEDROOM TRANSFORMATION</h2>
    <div class="grid">
        <img src="2D91C50D-51CB-4FB8-930D-C7E3B4F5030D.png">
    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Onluxe Living — Designed for luxury spaces
</div>

</body>
</html>
